services:
  - type: web
    name: iot-botnet-detector
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
    # Render sẽ dùng port 10000, nhớ thiết lập trong code hoặc để Render tự xử lý
